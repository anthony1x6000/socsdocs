name: Log Git Size on Push

on:
  push:
    branches:
      - '**'

jobs:
  log-git-size:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log size of .git/ directory
        run: |
          du -sh .git/
          